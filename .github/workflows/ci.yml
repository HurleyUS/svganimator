name: CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f bun.lockb ]; then
            bun install --frozen-lockfile || bun install --no-save
          else
            bun install --no-save
          fi

      - name: Format
        run: bun run format

      - name: Verify formatter produced no diff
        run: git diff --exit-code

      - name: Lint
        run: bun run lint

      - name: Check
        run: bun run check

      - name: Install FReview shell dependency
        run: |
          if ! command -v zsh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zsh
          fi

      - name: FReview
        run: bunx --bun github:HurleyUS/freview --ci
